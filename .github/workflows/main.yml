name: News Pulse Wake & Run

on:
  push:
    branches:
      - main        # Runs immediately when you push code to the main branch
  schedule:
    - cron: '0 */8 * * *' # Runs automatically every 8 hours
  workflow_dispatch:      # Adds a "Run workflow" button in the Actions tab for manual testing

jobs:
  run-script:
    runs-on: ubuntu-latest
    
    # This gives the Action permission to write files back to your repo (Cloudflare Pages)
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install feedparser tqdm groq pyTelegramBotAPI PyGithub cloudinary

      - name: Run News Crawl
        env:
          # Use the built-in GitHub Token (no manual setup required if permissions are set)
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_NAME: ${{ github.repository }}
          GITHUB_ACTIONS: "true"
        run: python main.py
