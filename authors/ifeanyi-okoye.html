<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Ifeanyi Clement Okoye | 9ja News Pluse</title>
    <meta name="description" content="Read the latest reports and analysis from Ifeanyi Clement Okoye on 9ja News Pluse.">
    <link rel="canonical" href="https://pluse.name.ng/authors/ifeanyi-okoye.html">

    <style>
        :root {
            --green: #00d26a;
            --green-dark: #00b85c;
            --bg: #f4f7f5;
            --text: #121212;
            --muted: #666;
            --white: #fff;
            --border: #e7e7e7;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial; background: var(--bg); color: var(--text); line-height: 1.7; }
        a { text-decoration: none; color: inherit; }

        .header { background: linear-gradient(90deg, var(--green), var(--green-dark)); padding: 14px 20px; position: fixed; width: 100%; top: 0; z-index: 1000; display:flex; justify-content:space-between; align-items:center; }
        .header-title { color: #fff; font-weight: 800; }
        .back-btn { color: #fff; font-size: 0.9rem; opacity: 0.9; }

        .wrapper { max-width: 780px; margin: 0 auto; padding: 90px 16px 60px; }

        /* AUTHOR PROFILE */
        .author-card {
            background: var(--white);
            padding: 35px 22px;
            border-radius: 12px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: 0 3px 12px rgba(0,0,0,0.04);
        }

        .author-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--green);
            margin-bottom: 15px;
            background: #eee;
        }

        .author-card h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 8px; color: var(--text); }
        .author-bio { color: var(--muted); font-size: 0.95rem; max-width: 550px; margin: 0 auto 20px; }
        
        .author-stats { 
            display: flex; 
            justify-content: center; 
            gap: 20px; 
            margin-bottom: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--green-dark);
        }

        /* ARTICLE FEED */
        .feed-title { 
            font-size: 1.1rem; 
            font-weight: 800; 
            margin-bottom: 15px; 
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .feed-title::after { content: ""; flex: 1; height: 1px; background: var(--border); }
        
        .post-card {
            background: var(--white);
            display: flex;
            gap: 15px;
            padding: 16px;
            border-radius: 10px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .post-card:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        
        .post-thumb { width: 130px; height: 90px; border-radius: 8px; object-fit: cover; flex-shrink: 0; }
        .post-info { display: flex; flex-direction: column; justify-content: center; }
        .post-info h2 { font-size: 1.1rem; line-height: 1.4; margin-bottom: 6px; font-weight: 700; }
        .post-meta { font-size: 0.8rem; color: var(--muted); }

        @media(max-width: 550px) {
            .post-card { flex-direction: column; }
            .post-thumb { width: 100%; height: 200px; }
        }
    </style>
</head>

<body>

<header class="header">
    <a href="/index.html" class="header-title">9ja News Pluse</a>
    <a class="back-btn" href="javascript:history.back()">← back</a>
</header>

<div class="wrapper">
    <!-- Profile Section -->
    <div class="author-card">
        <img src="__AUTHOR_IMAGE__" alt="Ifeanyi Clement Okoye" class="author-img">
        <h1>Ifeanyi Clement Okoye</h1>
        <p class="author-bio">__AUTHOR_BIO__</p>
        
        <div class="author-stats">
            <span>Verified Publisher</span>
            <span>•</span>
            <span>__ARTICLE_COUNT__ Articles</span>
        </div>
    </div>

    <!-- Articles Section -->
    <h3 class="feed-title">Latest Articles</h3>
    
    <div id="author-feed">
        <!-- Loop this block in build.js -->
        __LATEST_POSTS_DYNAMIC__
    </div>
</div>

</body>
</html>
