<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO & META -->
    <title>__TITLE__ | 9ja News Pluse</title>
    <meta name="description" content="__DESCRIPTION__">
    <meta name="robots" content="index, follow, max-snippet:-1, max-video-preview:-1">
    <meta name="googlebot" content="index, follow">
    <link rel="canonical" href="__CANONICAL_URL__">

    <!-- FEEDS -->
    <link rel="alternate" type="application/rss+xml" title="9ja News RSS Feed" href="https://pluse.name.ng/feed.xml">
    <link rel="sitemap" type="application/xml" title="Sitemap" href="https://pluse.name.ng/sitemap.xml">

    <!-- OPEN GRAPH -->
    <meta property="og:type" content="article">
    <meta property="og:site_name" content="9ja News Pluse">
    <meta property="og:title" content="__TITLE__">
    <meta property="og:description" content="__DESCRIPTION__">
    <meta property="og:url" content="__CANONICAL_URL__">
    <meta property="og:image" content="__IMAGE_URL__">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="675">

    <!-- TWITTER -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="__TITLE__">
    <meta name="twitter:description" content="__DESCRIPTION__">
    <meta name="twitter:image" content="__IMAGE_URL__">

    <link rel="preload" as="image" href="__IMAGE_URL__">

    <!-- STRUCTURED DATA -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "NewsArticle",
      "mainEntityOfPage": {
        "@type": "WebPage",
        "@id": "__CANONICAL_URL__"
      },
      "headline": "__TITLE__",
      "image": ["__IMAGE_URL__"],
      "datePublished": "__DATE_PUBLISHED__",
      "dateModified": "__DATE_MODIFIED__",
      "author": {
        "@type": "Person",
        "name": "Ifeanyi Clement Okoye",
        "url": "https://pluse.name.ng/authors/ifeanyi-okoye.html"
      },
      "publisher": {
        "@type": "Organization",
        "name": "9ja News Pluse",
        "logo": {
          "@type": "ImageObject",
          "url": "https://pluse.name.ng/logo.png"
        }
      },
      "description": "__DESCRIPTION__"
    }
    </script>

    <style>
        :root {
            --green: #00d26a;
            --green-dark: #00b85c;
            --green-glow: #00ff88;
            --bg: #f4f7f5;
            --text: #121212;
            --muted: #666;
            --white: #fff;
            --border: #e7e7e7;
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
            background: var(--bg);
            color: var(--text);
            line-height: 1.7;
        }

        a { text-decoration: none; color: inherit; }

        /* HEADER */
        .header {
            background: linear-gradient(90deg, var(--green), var(--green-dark));
            padding: 14px 20px;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .header-title {
            color: #fff;
            font-weight: 800;
        }

        .back-btn {
            color: #fff;
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .back-btn:hover { opacity: 1; }

        /* WRAPPER */
        .wrapper {
            max-width: 780px;
            margin: 0 auto;
            padding: 90px 16px 60px;
        }

        /* CARD */
        .card {
            background: var(--white);
            padding: 22px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.04);
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .meta {
            font-size: 0.85rem;
            color: var(--muted);
            margin-bottom: 18px;
        }

        /* AUTHOR LINK */
        .author-link {
            color: var(--green-dark);
            font-weight: 700;
        }

        /* IMAGE */
        .featured img {
            width: 100%;
            border-radius: 10px;
        }

        /* ADS */
        .ad-slot {
            background: linear-gradient(135deg, #eafff2, #d6ffe6);
            border: 1px solid var(--green);
            padding: 40px;
            text-align: center;
            margin: 20px 0;
            border-radius: 10px;
            font-weight: 600;
            color: var(--green-dark);
        }

        /* RELATED SECTION */
        .related {
            background: linear-gradient(135deg, var(--green), var(--green-dark));
            padding: 18px;
            border-radius: 12px;
            color: #fff;
            box-shadow: 0 10px 25px rgba(0,255,120,0.15);
        }

        .related h2 {
            margin-bottom: 12px;
            font-size: 1.1rem;
        }

        .related-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .related-item {
            background: rgba(255,255,255,0.15);
            border-radius: 10px;
            overflow: hidden;
            backdrop-filter: blur(6px);
        }

        .related-item img {
            width: 100%;
            height: 120px;
            object-fit: cover;
        }

        .related-item div {
            padding: 10px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        @media(max-width:600px){
            .related-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

<body>

<header class="header">
    <a href="/index.html" class="header-title">9ja News Pluse</a>
    <a class="back-btn" href="javascript:history.back()">← back</a>
</header>

<div class="wrapper">

    <!-- ARTICLE -->
    <div class="card">

        <h1>__TITLE__</h1>

        <div class="meta">
            By <a class="author-link" href="https://pluse.name.ng/authors/ifeanyi-okoye.html">
                ifeanyi clement okoye
            </a>
            • __DISPLAY_DATE__
        </div>

        <div class="featured">
            <img src="__IMAGE_URL__" alt="__TITLE__">
        </div>

        <p><b>__INTRO_PARAGRAPH__</b></p>

        <div>
            __CONTENT__
        </div>

    </div>

    <!-- AD SLOTS -->
    <div class="ad-slot">Ad Space 1</div>

    <div class="ad-slot">Ad Space 2</div>

    <!-- RELATED ARTICLES (DYNAMIC ONLY) -->
    <div class="related">

        <h2>More stories in this category</h2>

        <div class="related-grid">
            __RELATED_ARTICLES_DYNAMIC__
        </div>

    </div>

    <div class="ad-slot">Ad Space 3</div>

</div>

</body>
</html>
