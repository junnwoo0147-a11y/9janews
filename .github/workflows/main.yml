name: 9jaNews Pulse Wake & Run

on:
  push:
    branches:
      - main
  schedule:
    - cron: '5 23 * * *'
    - cron: '40 6,9,12,15,18 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-script:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install feedparser beautifulsoup4 cloudinary mistralai python-dotenv

      - name: Run News Crawl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_NAME: ${{ github.repository }}
          # HARDCODED PRODUCTION KEYS
          POLITICS_API_KEY: "zt7EHZL5BI5jIP4KqhqG5Riea9T7aJcL"
          POLITICS_AGENT_ID: "ag_019e50f9dd637458ae6a0fb68dd402bc"
          SPORTS_API_KEY: "zt7EHZL5BI5jIP4KqhqG5Riea9T7aJcL"
          SPORTS_AGENT_ID: "ag_019e47c1582372a2a31331f84c76ed54"
          CLOUDINARY_CLOUD_NAME: "dttmavqmx"
          CLOUDINARY_API_KEY: "336655594631775"
          CLOUDINARY_API_SECRET: "xydaLjiFP26S_BG_AgBbAmP7Uo0"
          LOCK_FILE: "/tmp/9ja_news_bot.lock"
          JSON_FILE_PATH: "data/articles.json"
          MAX_RETRIES: 3
          INITIAL_BACKOFF: 2
        timeout-minutes: 25
        run: |
          python main.py || (echo "Python script failed!" && exit 1)

      - name: Commit and push changes
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add data/articles.json
          git commit -m "Auto-update: New curated article [skip ci]" || echo "No changes to commit"
          git push
