<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="description" content="__DESCRIPTION__">
    <meta name="robots" content="index, follow, max-snippet:-1, max-video-preview:-1">
    <meta name="googlebot" content="index, follow">
    <link rel="canonical" href="__CANONICAL_URL__">

    <link rel="alternate" type="application/rss+xml" title="9ja News RSS Feed" href="https://blog.pluse.name.ng/feed.xml">
    <link rel="sitemap" type="application/xml" title="Sitemap" href="https://blog.pluse.name.ng/sitemap.xml">

    <meta property="og:type" content="article">
    <meta property="og:site_name" content="9ja News Pluse">
    <meta property="og:title" content="__TITLE__">
    <meta property="og:description" content="__DESCRIPTION__">
    <meta property="og:url" content="__CANONICAL_URL__">
    <meta property="og:image" content="__IMAGE_URL__">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="675">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="__TITLE__">
    <meta name="twitter:description" content="__DESCRIPTION__">
    <meta name="twitter:image" content="__IMAGE_URL__">

    <link rel="preload" as="image" href="__IMAGE_URL__">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "NewsArticle",
      "mainEntityOfPage": {
        "@type": "WebPage",
        "@id": "__CANONICAL_URL__"
      },
      "headline": "__TITLE__",
      "image": ["__IMAGE_URL__"],
      "datePublished": "__DATE_PUBLISHED__",
      "dateModified": "__DATE_MODIFIED__",
      "author": {
        "@type": "Person",
        "name": "Ifeanyi Clement Okoye",
        "url": "https://blog.pluse.name.ng/authors/ifeanyi-okoye.html"
      },
      "publisher": {
        "@type": "Organization",
        "name": "9ja News Pluse",
        "logo": {
          "@type": "ImageObject",
          "url": "https://blog.pluse.name.ng/logo.png"
        }
      },
      "description": "__DESCRIPTION__"
    }
    </script>

    <style>
        :root {
            --green: #00d26a;
            --green-dark: #00b85c;
            --bg: #f4f7f5;
            --text: #121212;
            --muted: #666;
            --white: #fff;
            --border: #e7e7e7;
            --twitter-color: #000000;
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
            background: var(--bg);
            color: var(--text);
            line-height: 1.7;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        a { text-decoration: none; color: inherit; }

        /* HEADER */
        .header {
            background: linear-gradient(90deg, var(--green), var(--green-dark));
            padding: 14px 20px;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .header-title { color: #fff; font-weight: 800; }
        .back-btn { color: #fff; font-size: 0.9rem; opacity: 0.9; }

        /* WRAPPER */
        .wrapper {
            max-width: 780px;
            margin: 0 auto;
            padding: 90px 16px 40px;
            flex: 1;
        }

        /* CARD */
        .card {
            background: var(--white);
            padding: 22px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.04);
        }

        h1 { font-size: 2rem; font-weight: 800; margin-bottom: 10px; }
        
        .meta { 
            font-size: 0.85rem; 
            color: var(--muted); 
            margin-bottom: 18px; 
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
        }
        .author-link { color: var(--green-dark); font-weight: 700; }
        
        .twitter-icon {
            display: inline-flex;
            align-items: center;
        }
        .twitter-icon svg { width: 14px; height: 14px; fill: var(--twitter-color); }

        .featured img { width: 100%; border-radius: 10px; margin-bottom: 15px; }
        .article-body p { margin-bottom: 1.5rem; }

        /* ADS */
        .ad-slot {
            background: #fafafa;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            padding: 25px 10px;
            text-align: center;
            margin: 30px 0;
            font-size: 0.7rem;
            color: var(--muted);
        }

        /* RELATED SECTION */
        .related {
            background: linear-gradient(135deg, var(--green), var(--green-dark));
            padding: 18px;
            border-radius: 12px;
            color: #fff;
            margin-bottom: 20px;
        }

        .related h2 { margin-bottom: 12px; font-size: 1.1rem; }
        .related-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .related-item { background: rgba(255,255,255,0.15); border-radius: 10px; overflow: hidden; }
        .related-item img { width: 100%; height: 120px; object-fit: cover; }
        .related-item div { padding: 10px; font-size: 0.9rem; font-weight: 600; }

        /* FOOTER */
        .footer {
            background: var(--white);
            padding: 30px 20px;
            text-align: center;
            border-top: 1px solid var(--border);
            font-size: 0.85rem;
            color: var(--muted);
        }
        .footer-links {
            margin-bottom: 10px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        .footer-links a:hover {
            color: var(--green-dark);
            text-decoration: underline;
        }

        @media(max-width:600px){
            .related-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

<body>

<header class="header">
    <a href="https://blog.pluse.name.ng/index.html" class="header-title">9ja News Pluse</a>
    <a class="back-btn" href="javascript:history.back()">← back</a>
</header>

<div class="wrapper">

    <div class="card">
        <h1>__TITLE__</h1>
        <div class="meta">
            By <a class="author-link" href="https://blog.pluse.name.ng/authors/ifeanyi-okoye.html">ifeanyi clement okoye</a>
            <a href="https://x.com/sirifeanyiokoye" class="twitter-icon" target="_blank" rel="noopener">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.355L7.45 3.551H5.987z"/></svg>
            </a>
            • __DISPLAY_DATE__
        </div>

        <div class="featured">
            <img src="__IMAGE_URL__" alt="__TITLE__">
        </div>

        <div id="article-body" class="article-body">
            __CONTENT__
        </div>
    </div>

    <div class="related">
        <h2>More stories in this category</h2>
        <div class="related-grid">
            __RELATED_ARTICLES_DYNAMIC__
        </div>
    </div>

    <div class="ad-slot">
        Ad Space 3
    </div>

</div>

<footer class="footer">
    <div class="footer-links">
        <a href="https://blog.pluse.name.ng/about.html">About Us</a>
        <a href="https://blog.pluse.name.ng/privacy.html">Privacy Policy</a>
    </div>
    <p>&copy; 2026 9ja News Pluse. All rights reserved.</p>
</footer>

<!-- Hidden Ad Templates -->
<div id="ad-logic-1" style="display:none;">
    <div class="ad-slot">Ad Space 1</div>
</div>
<div id="ad-logic-2" style="display:none;">
    <div class="ad-slot">Ad Space 2</div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const body = document.getElementById('article-body');
        if (body) {
            const paragraphs = body.getElementsByTagName('p');
            const ad1 = document.getElementById('ad-logic-1').innerHTML;
            const ad2 = document.getElementById('ad-logic-2').innerHTML;

            if (paragraphs.length >= 2) {
                paragraphs[1].insertAdjacentHTML('afterend', ad1);
            }
            if (paragraphs.length >= 5) {
                paragraphs[4].insertAdjacentHTML('afterend', ad2);
            } else if (paragraphs.length > 2) {
                body.insertAdjacentHTML('beforeend', ad2);
            }
        }
    });
</script>

</body>
</html>
