name: News Pulse Wake & Run

on:
  push:
    branches:
      - main
  schedule:
    # 12:05 AM WAT (which is 11:05 PM UTC) - For your immediate test run
    - cron: '5 23 * * *'
    # Your standard daily schedule (Runs at 7:40, 10:40, 13:40, 16:40, 19:40 WAT)
    - cron: '40 6,9,12,15,18 * * *'
  workflow_dispatch:

# This stops the 409 Conflict Error by killing old runs when a new one starts
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-script:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          # Removed old Telegram/AWS bloat and added the required mistralai package
          pip install feedparser beautifulsoup4 cloudinary mistralai

      - name: Run News Crawl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_NAME: ${{ github.repository }}
        timeout-minutes: 25
        run: |
          python main.py || (echo "Python script failed!" && exit 1)

      - name: Commit and push changes
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add data/articles.json
          git commit -m "Auto-update: New curated article [skip ci]" || exit 0
          git push
