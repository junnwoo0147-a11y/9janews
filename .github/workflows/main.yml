name: 9jaNews Pulse Wake & Run

on:
  # This triggers the bot immediately every time you push code to main
  push:
    branches:
      - main
  # This triggers the bot on your predefined schedule (UTC)
  schedule:
    - cron: '5 23 * * *'
    - cron: '40 6,9,12,15,18 * * *'
  # This allows a manual override only if you ever need to debug
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-script:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install feedparser beautifulsoup4 cloudinary mistralai python-dotenv

      - name: Run News Crawl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_NAME: ${{ github.repository }}
          # Map GitHub Secrets to environment variables for the script
          POLITICS_API_KEY: ${{ secrets.POLITICS_API_KEY }}
          POLITICS_AGENT_ID: ${{ secrets.POLITICS_AGENT_ID }}
          SPORTS_API_KEY: ${{ secrets.SPORTS_API_KEY }}
          SPORTS_AGENT_ID: ${{ secrets.SPORTS_AGENT_ID }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          LOCK_FILE: "/tmp/9ja_news_bot.lock"
          JSON_FILE_PATH: "data/articles.json"
          MAX_RETRIES: 3
          INITIAL_BACKOFF: 2
        timeout-minutes: 25
        run: |
          python main.py || (echo "Python script failed!" && exit 1)

      - name: Commit and push changes
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add data/articles.json
          # Only commit if there are actual changes
          git commit -m "Auto-update: New curated article [skip ci]" || echo "No changes to commit"
          git push
