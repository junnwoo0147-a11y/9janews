name: News Pulse Wake & Run

on:
  schedule:
    - cron: '0 */8 * * *' # Every 8 hours
  workflow_dispatch:      # Manual trigger button

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install feedparser tqdm groq pyTelegramBotAPI PyGithub cloudinary
      - name: Run Script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_NAME: ${{ github.repository }}
          GITHUB_ACTIONS: "true"
        run: python main.py
