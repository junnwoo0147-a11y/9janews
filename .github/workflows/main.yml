name: News Pulse Wake & Run

on:
  push:
    branches:
      - main
  schedule:
    # 8am, 1pm, 4pm, 7pm, 11pm (Matches your 5-times-a-day requirement)
    - cron: '0 8,13,16,19,23 * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Essential for pushing back to your repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install feedparser requests beautifulsoup4 google-genai pyTelegramBotAPI PyGithub cloudinary apscheduler

      - name: Run News Crawl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_NAME: ${{ github.repository }}
        run: python main.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add data/articles.json
          git commit -m "Auto-update: New curated article [skip ci]" || exit 0
          git push
